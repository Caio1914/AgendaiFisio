<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selecione seu Perfil - Sistema de Agendamento</title>
    <link rel="stylesheet" href="estilogeral.css">

</head>
<body>

    <div class="auth-container" style="max-width: 550px;">
        <div class="auth-box">
            <h2 style="font-size: 24px; letter-spacing: -0.5px;">Como deseja se cadastrar?</h2>
            <p style="color: #64748b; margin-top: 8px;">Escolha o perfil ideal para começar sua jornada.</p>

            <div class="selecao-container">
                <!-- Opção Paciente -->
                <a href="./cadastroPaciente.html" class="link-invisivel">
                    <div class="card-opcao paciente-card">
                        <div class="icone-wrapper">👤</div>
                        <h3>Sou Paciente</h3>
                        <span class="descricao">Quero agendar consultas</span>
                    </div>
                </a>

                <!-- Opção Terapeuta -->
                <a href="./cadastroTerapeuta.html" class="link-invisivel">
                    <div class="card-opcao profissional-card">
                        <div class="icone-wrapper">🩺</div>
                        <h3>Sou Profissional</h3>
                        <span class="descricao">Quero atender pacientes</span>
                    </div>
                </a>
            </div>

            <div class="auth-footer">
                <span style="color: #94a3b8;">Já possui uma conta? <a href="./login.html" style="color: #A7C27E; font-weight: bold; text-decoration: none; margin-left: 5px;">Acessar agora</a></span>
            </div>
        </div>
    </div>

</body>
</html>
