<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Agendamento</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login-container">
        <form class="login-box">
            <h2>Acessar Conta</h2>
            <p>Entre com seu e-mail para agendar</p>

           <div class="input-group">
    <label for="cpfLogin">CPF</label>
    <div class="passo">
        <input type="text" 
               id="cpfLogin" 
               placeholder="000.000.000-00" 
               maxlength="14" 
               class="input-estilizado"
               required>
    </div>
</div>


            <div class="input-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" placeholder="Digite sua senha" class="input-estilizado">
            </div>

            <button type="button" id="btnEntrar" class="btn-auth">Entrar</button>
            
            <div class="auth-footer">
                <a href="./esqueceu a senha.html">Esqueceu a senha?</a>
                <span>Não tem conta? <a href="cadastro.html">Cadastre-se</a></span>
            </div>
        </form>
    </div>

    <script src="login.js"></script>
</body>
</html>
